<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin}">

<head>
    <title>お知らせ管理</title>
</head>

<body>
    <main layout:fragment="content">
        <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
            <h1 class="h3 fw-bold"><i class="bi bi-megaphone text-success"></i> お知らせ管理</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
                <a th:href="@{/admin/notice/new}" class="btn btn-sm btn-success">
                    <i class="bi bi-plus-lg"></i> 新規作成
                </a>
            </div>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm" style="border-radius: 15px; border: none;">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">No.</th>
                                <th>タイトル</th>
                                <th>状態</th>
                                <th>作成日</th>
                                <th class="pe-4 text-center">管理</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="notice, stat : ${notices}">
                                <td class="ps-4 text-muted" th:text="${stat.count}">1</td>
                                <td class="fw-bold" th:text="${notice.title}">お知らせタイトル</td>
                                <td>
                                    <span th:if="${notice.active}" class="badge bg-success">公開中</span>
                                    <span th:if="${!notice.active}" class="badge bg-secondary">非公開</span>
                                </td>
                                <td th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">2026-02-23</td>
                                <td class="pe-4 text-center">
                                    <a th:href="@{/admin/notice/edit/{id}(id=${notice.noticeId})}"
                                        class="btn btn-sm btn-outline-primary">
                                        編集
                                    </a>
                                    <form th:action="@{/admin/notice/delete/{id}(id=${notice.noticeId})}" method="post"
                                        class="d-inline" onsubmit="return confirm('本当にこのお知らせを削除しますか？');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            削除
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(notices)}">
                                <td colspan="5" class="text-center text-muted py-5">
                                    <i class="bi bi-envelope-x fs-1 d-block mb-2 opacity-50"></i>
                                    登録されたお知らせがありません。
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
