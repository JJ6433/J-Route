<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin}">

<head>
    <title>お知らせ編集</title>
</head>

<body>
    <main layout:fragment="content">
        <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
            <h1 class="h3 fw-bold">
                <i class="bi bi-megaphone text-success"></i>
                <span th:text="${notice.noticeId == null ? 'お知らせ登録' : 'お知らせの編集'}">お知らせ</span>
            </h1>
        </div>

        <div class="card shadow-sm border-0" style="border-radius: 15px;">
            <div class="card-body p-4">
                <form
                    th:action="${notice.noticeId == null ? '/admin/notice/new' : '/admin/notice/edit/' + notice.noticeId}"
                    th:object="${notice}" method="post">

                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">タイトル</label>
                        <input type="text" class="form-control" id="title" th:field="*{title}" required
                            placeholder="タイトルを入力してください">
                    </div>

                    <div class="mb-3">
                        <label for="content" class="form-label fw-bold">内容</label>
                        <textarea class="form-control" id="content" th:field="*{content}" rows="10" required
                            placeholder="内容を入力してください"></textarea>
                    </div>

                    <div class="mb-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="active" th:field="*{active}">
                        <label class="form-check-label fw-bold" for="active">メインページに表示する</label>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a th:href="@{/admin/notice}" class="btn btn-outline-secondary px-4">キャンセル</a>
                        <button type="submit" class="btn btn-success px-4"
                            th:text="${notice.noticeId == null ? '登録' : '保存'}">登録</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>

</html>
