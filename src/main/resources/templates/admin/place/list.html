<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin}">

<head>
    <title>旅行先管理</title>
    <style>
        .place-thumbnail {
            width: 70px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #eee;
        }
    </style>
</head>

<body>
    <main layout:fragment="content">
        <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
            <h1 class="h3 fw-bold"><i class="bi bi-geo-alt text-success"></i> 旅行先管理</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
                <a th:href="@{/admin/place/edit}" class="btn btn-sm text-white shadow-sm"
                    style="background-color: var(--primary-color);">
                    <i class="bi bi-plus-lg"></i> 新規登録
                </a>
            </div>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm" style="border-radius: 15px; border: none;">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4 text-center" style="width: 100px;">画像</th>
                                <th>名前</th>
                                <th>地域</th>
                                <th>カテゴリ</th>
                                <th class="pe-4 text-center" style="width: 150px;">管理</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="place : ${places}">
                                <td class="ps-4 text-center">
                                    <img th:src="${place.imageUrl != null ? place.imageUrl : 'https://via.placeholder.com/70x50?text=No+Img'}"
                                        class="place-thumbnail" alt="thumbnail">
                                </td>
                                <td class="fw-bold text-dark" th:text="${place.name}">場所名</td>
                                <td><span class="badge bg-secondary" th:text="${place.region}">地域</span></td>
                                <td><span class="badge bg-light text-dark border"
                                        th:text="${place.category}">カテゴリ</span></td>
                                <td class="pe-4 text-center">
                                    <div class="btn-group shadow-sm" role="group">
                                        <a th:href="@{/admin/place/edit(id=${place.placeId})}"
                                            class="btn btn-sm btn-outline-success"><i
                                                class="bi bi-pencil-square"></i></a>
                                        <form th:action="@{/admin/place/delete}" method="post" class="d-inline"
                                            onsubmit="return confirm('本当に削除しますか？');">
                                            <input type="hidden" name="id" th:value="${place.placeId}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                                style="border-top-left-radius: 0; border-bottom-left-radius: 0;"><i
                                                    class="bi bi-trash"></i></button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
