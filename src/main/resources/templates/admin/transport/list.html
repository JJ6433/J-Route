<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin}">

<head>
    <title>パス券管理</title>
</head>

<body>
    <main layout:fragment="content">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
            <h1 class="h3 fw-bold"><i class="bi bi-bus-front text-success"></i> パス券管理</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
                <a th:href="@{/admin/transport/form}" class="btn btn-sm btn-success">
                    <i class="bi bi-plus-lg"></i> 新規作成
                </a>
            </div>
        </div>

        <div class="card shadow-sm" style="border-radius: 15px; border: none;">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">No.</th>
                                <th>アイコン</th>
                                <th>パス名</th>
                                <th>価格</th>
                                <th class="pe-4 text-center">管理</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="pass, stat : ${passList}">
                                <td class="ps-4 text-muted" th:text="${stat.count}">1</td>
                                <td style="font-size: 1.5rem;" th:text="${pass.iconEmoji}">🎫</td>
                                <td class="fw-bold" th:text="${pass.name}">パス名</td>
                                <td th:text="${#numbers.formatInteger(pass.price, 0, 'COMMA')} + '円'">0円</td>
                                <td class="pe-4 text-center">
                                    <a th:href="@{/admin/transport/form/{id}(id=${pass.id})}"
                                        class="btn btn-sm btn-outline-primary">
                                        編集
                                    </a>
                                    <form th:action="@{/admin/transport/delete/{id}(id=${pass.id})}" method="post"
                                        class="d-inline" onsubmit="return confirm('本当にこのパス券を削除しますか？');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            削除
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(passList)}">
                                <td colspan="5" class="text-center text-muted py-5">
                                    <i class="bi bi-ticket-detailed fs-1 d-block mb-2 opacity-50"></i>
                                    登録されたパス券がありません。
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
