<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: headFragment}"></head>
<style>
    .timeline-item {
        transition: background-color 0.2s;
        cursor: pointer;
    }

    .timeline-item:hover {
        background-color: #f8f9fa;
    }

    .cursor-pointer {
        cursor: pointer;
    }

    .day-card .card-header:hover {
        background-color: #fff5f5 !important;
    }

    #map-status .btn-group .btn {
        font-size: 0.75rem;
    }
</style>

<body class="d-flex flex-column min-vh-100">
    <header th:replace="~{fragments/header :: headerFragment}"></header>
    <main class="container mt-4 mb-4 flex-grow-1">
        <div class="container mb-5">
            <h2 class="jroute-section-title" th:text="${title != null ? title : '旅行コース'}">旅行コース</h2>

            <div class="row mt-4">
                <!-- 左側: タイムラインと編集フォーム -->
                <div class="col-lg-7">
                    <div class="card jroute-card mb-4 shadow-sm border-0">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center w-100">
                                <h4 class="mb-0 fw-bold text-danger">
                                    <i class="bi bi-journal-text me-2"></i>AI 旅行プラン
                                    <span id="unsaved-badge" class="badge bg-warning text-dark ms-2 d-none"
                                        style="font-size: 0.7rem;">未保存の変更</span>
                                </h4>
                                <div class="d-flex align-items-center" th:if="${planner != null}">
                                    <!-- Share Button -->
                                    <button type="button" class="btn btn-outline-danger btn-sm me-2"
                                        data-bs-toggle="modal" data-bs-target="#shareModal" th:if="${isOwner ?: false}">
                                        <i class="bi bi-share me-1"></i> 共有
                                    </button>
                                    <!-- Collaborators Badge -->
                                    <span class="badge bg-light text-dark border me-2"
                                        th:if="${collaborators != null and not #lists.isEmpty(collaborators)}">
                                        <i class="bi bi-people-fill me-1"></i> <span
                                            th:text="${collaborators.size()}">0</span>
                                    </span>
                                    <span class="text-muted small me-3" th:if="${canEdit == false}">
                                        <i class="bi bi-lock-fill me-1"></i> 読み取り専用
                                    </span>
                                    <form th:action="@{/planner/delete}" method="post"
                                        onsubmit="return confirm('このプランを削除しますか？');" th:if="${isOwner ?: false}">
                                        <input type="hidden" name="plannerId" th:value="${planner.plannerId}" />
                                        <button type="submit" class="btn btn-link text-danger p-0 small">削除</button>
                                    </form>
                                </div>
                            </div>

                            <form id="savePlanForm" th:action="${planner == null ? '/planner/save' : '/planner/update'}"
                                method="post">
                                <div th:if="${planner != null}">
                                    <input type="hidden" name="plannerId" th:value="${planner.plannerId}" />
                                </div>
                                <div class="input-group mb-3 shadow-sm rounded">
                                    <span class="input-group-text bg-white border-end-0"><i
                                            class="bi bi-pencil-fill text-muted"></i></span>
                                    <input type="text" name="title" class="form-control border-start-0"
                                        th:value="${title}" required placeholder="プランの名前を入力してください"
                                        th:readonly="${canEdit == false}">
                                    <button type="submit" class="btn jroute-btn-primary px-4"
                                        th:text="${planner == null ? 'このプランを保存' : '変更を保存'}" th:if="${canEdit != false}">
                                    </button>
                                </div>
                                <input type="hidden" name="planData" id="planDataInput" th:value="${planData}">
                            </form>
                        </div>
                    </div>

                    <!-- 日別タイムライン -->
                    <div id="timeline-container" class="mb-4"></div>
                </div>

                <!-- 右側: 地図 (Sticky) -->
                <div class="col-lg-5">
                    <div class="sticky-top" style="top: 2rem; z-index: 10;">
                        <div id="planner-map" class="shadow-sm border rounded overflow-hidden"
                            style="height: 600px; background: #e9ecef;">
                            <div class="d-flex align-items-center justify-content-center h-100 text-muted">
                                <div class="text-center">
                                    <div class="spinner-border text-danger mb-2" role="status"></div>
                                    <p class="mb-0">地図を読み込み中...</p>
                                </div>
                            </div>
                        </div>
                        <div class="card mt-2 border-0 shadow-sm">
                            <div class="card-body py-2 px-3 small text-muted d-flex justify-content-between">
                                <span><i class="bi bi-info-circle me-1"></i>動線をひと目で確認しましょう</span>
                                <span id="map-status"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 일정 추가 모달 -->
            <!-- ... (AddItemModal remains same but should be disabled if !canEdit) ... -->

            <!-- 공유 및 협업 모달 -->
            <div class="modal fade" id="shareModal" tabindex="-1" aria-labelledby="shareModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content border-0 shadow">
                        <div class="modal-header bg-dark text-white">
                            <h5 class="modal-title fw-bold" id="shareModalLabel"><i
                                    class="bi bi-share-fill me-2"></i>プランを共有・協力</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                                aria-label="Close"></button>
                        </div>
                        <div class="modal-body p-4">
                            <!-- Link Sharing -->
                            <div th:if="${planner != null}">
                                <label class="form-label fw-bold">共有リンク</label>
                                <div class="input-group mb-3">
                                    <input type="text" id="shareLink" class="form-control"
                                        th:data-id="${planner.plannerId}" value="読み込み中..." readonly>
                                    <button class="btn btn-outline-secondary" type="button"
                                        onclick="copyShareLink()">コピー</button>
                                </div>
                                <form th:action="@{/planner/share/toggle}" method="post" class="mb-4">
                                    <input type="hidden" name="plannerId" th:value="${planner.plannerId}" />
                                    <input type="hidden" name="isPublic" th:value="${!planner.isPublic}" />
                                    <div class="form-check form-switch" th:if="${isOwner ?: false}">
                                        <input class="form-check-input" type="checkbox" id="publicSwitch"
                                            onchange="this.form.submit()" th:checked="${planner.isPublic}">
                                        <label class="form-check-label" for="publicSwitch"
                                            th:text="${planner.isPublic ? '公に公開中' : 'リンクを知っている人だけが閲覧可能'}"></label>
                                    </div>
                                    <div th:unless="${isOwner ?: false}">
                                        <span class="badge bg-info"
                                            th:text="${planner.isPublic ? '公開プラン' : '非公開プラン'}"></span>
                                    </div>
                                </form>

                                <hr>

                                <!-- Collaborators -->
                                <label class="form-label fw-bold">協力者</label>
                                <ul class="list-group list-group-flush mb-3">
                                    <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                                        <span><i class="bi bi-person-fill me-2"></i>作成者 (Owner)</span>
                                    </li>
                                    <li th:each="col : ${collaborators}" th:if="${collaborators != null}"
                                        class="list-group-item d-flex justify-content-between align-items-center px-0">
                                        <span th:text="${col.nickname + ' (@' + col.username + ')'}">Nickname</span>
                                        <span class="badge bg-light text-dark border">EDITOR</span>
                                    </li>
                                </ul>

                                <!-- Invite Form (Owner Only) -->
                                <form th:if="${isOwner ?: false}" th:action="@{/planner/invite}" method="post">
                                    <input type="hidden" name="plannerId" th:value="${planner.plannerId}" />
                                    <div class="input-group">
                                        <input type="text" name="inviteUsername" class="form-control"
                                            placeholder="友達のIDを入力してください" required>
                                        <button type="submit" class="btn btn-dark">招待</button>
                                    </div>
                                </form>
                            </div>
                            <div th:unless="${planner != null}">
                                <p class="text-center text-muted py-4">プランを保存すると共有できます。</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- JSONパース失敗時やデータなし時のフォールバック -->
            <div id="timeline-fallback" class="border-start border-3 border-secondary ps-3 mb-4" style="display: none;">
                <p class="text-muted small">生成されたコースデータ（JSON）:</p>
                <pre class="bg-light p-3 rounded" id="plan-raw" th:text="${planData}"></pre>
            </div>

            <div class="mt-3">
                <a th:href="@{/planner/form}" class="btn btn-outline-view me-2">もう一度作成</a>
                <a th:href="@{/planner/list}" class="btn btn-outline-view" sec:authorize="isAuthenticated()">マイプラン一覧</a>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>

    <div id="plan-data-carrier" th:if="${planData}" th:attr="data-plan=${planData}" style="display:none;"></div>

    <script th:inline="javascript">
        (function () {
            var planDataRaw = /*[[${planData}]]*/ 'null';
            if (!planDataRaw || planDataRaw === 'null') {
                document.getElementById('timeline-fallback').style.display = 'block';
                return;
            }
            try {
                var plan = typeof planDataRaw === 'string' ? JSON.parse(planDataRaw) : planDataRaw;
                if (!plan || !plan.days) {
                    console.warn('No days in plan:', plan);
                    document.getElementById('timeline-fallback').style.display = 'block';
                    return;
                }
                var container = document.getElementById('timeline-container');
                var googleMap = null;
                var markers = [];
                var polylines = [];
                var geoCache = {};
                var timelineDayCards = [];

                // --- Share Link Initialization ---
                var shareInput = document.getElementById('shareLink');
                if (shareInput) {
                    var pId = shareInput.getAttribute('data-id');
                    shareInput.value = window.location.origin + window.location.pathname + '?id=' + pId;
                }

                function renderPlan() {
                    container.innerHTML = '';
                    timelineDayCards = [];
                    if (plan.error) {
                        container.innerHTML = `
                            <div class="alert alert-danger shadow-sm border-0 d-flex align-items-center" role="alert">
                                <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
                                <div>
                                    <h5 class="alert-heading fw-bold mb-1">プラン生成エラー</h5>
                                    <p class="mb-0">${escapeHtml(plan.error)}</p>
                                </div>
                            </div>
                        `;
                        return;
                    }

                    plan.days.forEach(function (dayObj, dayIndex) {
                        var dayNum = dayObj.day || 0;
                        var items = dayObj.items || [];

                        var dayCard = document.createElement('div');
                        dayCard.className = 'card jroute-card mb-4 shadow-sm border-0 day-card';
                        dayCard.dataset.dayIndex = dayIndex;
                        timelineDayCards.push(dayCard);

                        var dayTitle = document.createElement('div');
                        dayTitle.className = 'card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center cursor-pointer';
                        dayTitle.style.cursor = 'pointer';
                        dayTitle.innerHTML = `<h5 class="mb-0 fw-bold text-danger"><i class="bi bi-geo-alt-fill me-2"></i>Day ${dayNum}</h5>
                                             <span class="badge bg-light text-muted border small">地図フォーカス</span>`;
                        dayTitle.onclick = function () {
                            updateMapMarkers(dayIndex);
                        };
                        dayCard.appendChild(dayTitle);

                        var list = document.createElement('ul');
                        list.className = 'list-group list-group-flush';

                        items.forEach(function (item, itemIndex) {
                            var li = document.createElement('li');
                            li.className = 'list-group-item d-flex justify-content-between align-items-center py-4 position-relative timeline-item';
                            li.dataset.itemIndex = itemIndex;
                            li.dataset.dayIndex = dayIndex;

                            // Highlight marker on hover
                            li.onmouseenter = function () { highlightMarker(dayIndex, itemIndex, true); };
                            li.onmouseleave = function () { highlightMarker(dayIndex, itemIndex, false); };

                            var left = document.createElement('div');
                            left.className = 'd-flex align-items-start flex-grow-1 me-3';

                            var time = document.createElement('span');
                            time.className = 'badge bg-light text-dark border me-3 mt-1';
                            time.style.minWidth = '4.5rem';
                            time.style.fontSize = '0.9rem';
                            time.textContent = item.time || '--:--';

                            var info = document.createElement('div');
                            info.innerHTML = '<h6 class="mb-1 fw-bold fs-5">' + escapeHtml(item.title || '') + '</h6>' +
                                (item.memo ? '<p class="text-muted mb-0">' + escapeHtml(item.memo) + '</p>' : '');

                            left.appendChild(time);
                            left.appendChild(info);
                            li.appendChild(left);

                            // --- Delete Button ---
                            if (/*[[${canEdit != false}]]*/ true) {
                                var deleteBtn = document.createElement('button');
                                deleteBtn.className = 'btn btn-outline-danger btn-sm rounded-circle position-absolute top-0 end-0 m-2 edit-btn';
                                deleteBtn.style.zIndex = '5';
                                deleteBtn.innerHTML = '<i class="bi bi-x"></i>';
                                deleteBtn.onclick = function (e) {
                                    e.stopPropagation();
                                    if (confirm('この項目を削除しますか？')) {
                                        plan.days[dayIndex].items.splice(itemIndex, 1);
                                        updatePlanData();
                                        renderPlan();
                                    }
                                };
                                li.appendChild(deleteBtn);
                            }

                            // --- Image Part with Google Places Photo ---
                            var imgContainer = document.createElement('div');
                            imgContainer.className = 'ms-3 flex-shrink-0 shadow-sm';
                            imgContainer.style = 'width: 140px; height: 100px; position: relative; border-radius: 8px; overflow: hidden; background: #f8f9fa; border: 1px solid #eee;';

                            var img = document.createElement('img');
                            img.className = 'w-100 h-100';
                            img.style = 'object-fit: cover; transition: opacity 0.3s ease; opacity: 0;';
                            img.alt = item.title;

                            function loadPhoto() {
                                if (window.google && window.google.maps && window.google.maps.places) {
                                    var service = new google.maps.places.PlacesService(document.createElement('div'));
                                    var request = { query: item.title, fields: ['photos', 'name'] };
                                    service.findPlaceFromQuery(request, function (results, status) {
                                        if (status === google.maps.places.PlacesServiceStatus.OK && results[0].photos) {
                                            var photoUrl = results[0].photos[0].getUrl({ maxWidth: 300, maxHeight: 200 });
                                            img.src = photoUrl;
                                            img.style.opacity = '1';
                                        } else {
                                            fallbackImages();
                                        }
                                    });
                                } else {
                                    fallbackImages();
                                }
                            }

                            function fallbackImages() {
                                var keywords = (item.keyword || item.title || 'Japan').toLowerCase().replace(/\s+/g, ',');
                                var sources = [
                                    'https://images.unsplash.com/photo-1528164344705-47542687990d?auto=format&fit=crop&w=300&h=200',
                                    'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=300&h=200',
                                    'https://images.unsplash.com/photo-1542051841857-5f90071e7989?auto=format&fit=crop&w=300&h=200'
                                ];
                                function tryLoad(idx) {
                                    if (idx >= sources.length) return;
                                    var temp = new Image();
                                    temp.onload = function () { img.src = sources[idx]; img.style.opacity = '1'; };
                                    temp.onerror = function () { tryLoad(idx + 1); };
                                    temp.src = sources[idx];
                                }
                                tryLoad(0);
                            }

                            loadPhoto();
                            imgContainer.appendChild(img);
                            li.appendChild(imgContainer);
                            list.appendChild(li);
                        });

                        dayCard.appendChild(list);

                        // --- Add Item Button ---
                        var dayFooter = document.createElement('div');
                        dayFooter.className = 'card-footer bg-light border-0 py-3 text-center';
                        var addBtn = document.createElement('button');
                        addBtn.className = 'btn btn-outline-danger btn-sm rounded-pill px-4';
                        addBtn.innerHTML = '<i class="bi bi-plus-lg me-1"></i>予定を追加';
                        addBtn.onclick = function () { window.showAddItemModal(dayIndex); };
                        dayFooter.appendChild(addBtn);
                        dayCard.appendChild(dayFooter);

                        container.appendChild(dayCard);
                    });

                    // --- Update Map ---
                    if (window.google && window.google.maps) {
                        updateMapMarkers();
                        updateMapFilterUI();
                    }
                }

                function updateMapFilterUI() {
                    var statusEl = document.getElementById('map-status');
                    if (!statusEl) return;

                    var html = '<div class="btn-group btn-group-sm ms-2" role="group">';
                    html += '<button type="button" class="btn btn-outline-secondary py-0" onclick="window.updateMapMarkers()">すべて</button>';
                    plan.days.forEach((d, i) => {
                        html += `<button type="button" class="btn btn-outline-danger py-0" onclick="window.updateMapMarkers(${i})">Day ${d.day}</button>`;
                    });
                    html += '</div>';
                    statusEl.innerHTML = html;
                }

                window.showAddItemModal = function (dayIndex) {
                    document.getElementById('targetDayIndex').value = dayIndex;
                    document.getElementById('newItemTime').value = '';
                    document.getElementById('newItemTitle').value = '';
                    document.getElementById('newItemMemo').value = '';
                    var modal = new bootstrap.Modal(document.getElementById('addItemModal'));
                    modal.show();
                };

                window.confirmAddItem = function () {
                    var dayIndex = parseInt(document.getElementById('targetDayIndex').value);
                    var time = document.getElementById('newItemTime').value;
                    var title = document.getElementById('newItemTitle').value;
                    var memo = document.getElementById('newItemMemo').value;

                    if (!time || !title) {
                        alert('時間と場所を入力してください。');
                        return;
                    }

                    var newItem = {
                        time: time,
                        title: title,
                        memo: memo
                    };

                    plan.days[dayIndex].items.push(newItem);

                    // Close modal
                    var modalEl = document.getElementById('addItemModal');
                    var modal = bootstrap.Modal.getInstance(modalEl);
                    modal.hide();

                    updatePlanData();
                    renderPlan();
                };

                function updatePlanData() {
                    // --- Time Sorting Logic ---
                    plan.days.forEach(function (day) {
                        if (day.items && day.items.length > 1) {
                            day.items.sort(function (a, b) {
                                return parseTime(a.time) - parseTime(b.time);
                            });
                        }
                    });

                    var jsonStr = JSON.stringify(plan);
                    var input = document.getElementById('planDataInput');
                    if (input) input.value = jsonStr;
                    var badge = document.getElementById('unsaved-badge');
                    if (badge) badge.classList.remove('d-none');
                }

                function parseTime(timeStr) {
                    if (!timeStr) return 9999;
                    var s = timeStr.toLowerCase().replace(/\s+/g, '');

                    // --- Extract numbers ---
                    var match = s.match(/(\d+)(?::(\d+))?/);
                    if (!match) {
                        if (s.indexOf('午前') !== -1 || s.indexOf('morning') !== -1) return 800;
                        if (s.indexOf('昼') !== -1 || s.indexOf('noon') !== -1) return 1200;
                        if (s.indexOf('午後') !== -1 || s.indexOf('afternoon') !== -1) return 1400;
                        if (s.indexOf('夜') !== -1 || s.indexOf('night') !== -1) return 2000;
                        return 9999;
                    }

                    var hour = parseInt(match[1]);
                    var min = match[2] ? parseInt(match[2]) : 0;

                    // --- Handle AM/PM/午後/午前 ---
                    if ((s.indexOf('pm') !== -1 || s.indexOf('午後') !== -1) && hour < 12) hour += 12;
                    if ((s.indexOf('am') !== -1 || s.indexOf('午前') !== -1) && hour === 12) hour = 0;

                    return hour * 100 + min;
                }

                // --- Google Maps Integration ---
                window.initMapWrapper = function () {
                    var mapEl = document.getElementById('planner-map');
                    if (!mapEl) return;
                    googleMap = new google.maps.Map(mapEl, {
                        zoom: 12,
                        center: { lat: 35.6812, lng: 139.7671 }, // Default Tokyo
                        mapTypeControl: false,
                        streetViewControl: false,
                        styles: [
                            {
                                "featureType": "poi.business",
                                "stylers": [{ "visibility": "off" }]
                            },
                            {
                                "featureType": "transit",
                                "elementType": "labels.icon",
                                "stylers": [{ "visibility": "off" }]
                            }
                        ]
                    });
                    renderPlan();
                };

                async function updateMapMarkers(focusDayIndex) {
                    if (!googleMap) return;

                    // Clear existing
                    markers.forEach(m => m.setMap(null));
                    polylines.forEach(p => p.setMap(null));
                    markers = [];
                    polylines = [];

                    var bounds = new google.maps.LatLngBounds();
                    var hasAnyMarker = false;

                    for (let dayIndex = 0; dayIndex < plan.days.length; dayIndex++) {
                        // Skip if focusing on another day
                        if (focusDayIndex !== undefined && focusDayIndex !== null && focusDayIndex !== dayIndex) {
                            continue;
                        }

                        let items = plan.days[dayIndex].items;
                        let dayPath = [];

                        for (let itemIndex = 0; itemIndex < items.length; itemIndex++) {
                            let item = items[itemIndex];
                            let coords = await getCoords(item.title);
                            if (coords) {
                                var marker = new google.maps.Marker({
                                    position: coords,
                                    map: googleMap,
                                    label: {
                                        text: (dayIndex + 1) + '-' + (itemIndex + 1),
                                        color: "white",
                                        fontSize: '10px',
                                        fontWeight: 'bold'
                                    },
                                    title: item.title,
                                    icon: {
                                        path: google.maps.SymbolPath.CIRCLE,
                                        fillColor: getDayColor(dayIndex),
                                        fillOpacity: 1,
                                        strokeWeight: 2,
                                        strokeColor: 'white',
                                        scale: 14
                                    }
                                });
                                // Store indices for later highlighting
                                marker.set('dayIndex', dayIndex);
                                marker.set('itemIndex', itemIndex);

                                markers.push(marker);
                                dayPath.push(coords);
                                bounds.extend(coords);
                                hasAnyMarker = true;
                            }
                        }

                        if (dayPath.length > 1) {
                            var polyline = new google.maps.Polyline({
                                path: dayPath,
                                geodesic: true,
                                strokeColor: getDayColor(dayIndex),
                                strokeOpacity: 0.8,
                                strokeWeight: 4,
                                map: googleMap
                            });
                            polylines.push(polyline);
                        }
                    }

                    if (hasAnyMarker) {
                        googleMap.fitBounds(bounds);
                        // zoom adjustment if too close
                        setTimeout(() => {
                            if (googleMap && googleMap.getZoom() > 15) googleMap.setZoom(15);
                        }, 200);
                    }
                }
                window.updateMapMarkers = updateMapMarkers;

                function highlightMarker(dayIndex, itemIndex, isHighlight) {
                    markers.forEach(m => {
                        if (m.get('dayIndex') === dayIndex && m.get('itemIndex') === itemIndex) {
                            if (isHighlight) {
                                m.setAnimation(google.maps.Animation.BOUNCE);
                                setTimeout(() => m.setAnimation(null), 1500);
                            } else {
                                m.setAnimation(null);
                            }
                        }
                    });
                }

                async function getCoords(placeName) {
                    if (geoCache[placeName]) return geoCache[placeName];

                    return new Promise((resolve) => {
                        var geocoder = new google.maps.Geocoder();
                        geocoder.geocode({ address: placeName }, (results, status) => {
                            if (status === 'OK') {
                                var loc = results[0].geometry.location;
                                geoCache[placeName] = loc;
                                resolve(loc);
                            } else {
                                console.warn('Geocoding failed for:', placeName, status);
                                resolve(null);
                            }
                        });
                    });
                }

                function getDayColor(index) {
                    var colors = ['#dc3545', '#0d6efd', '#198754', '#ffc107', '#6f42c1', '#fd7e14'];
                    return colors[index % colors.length];
                }

                // Initial render will be called by initMapWrapper callback
                if (window.google) {
                    renderPlan();
                } else {
                    renderPlan();
                }

            } catch (e) {
                console.error('Render Error:', e);
                document.getElementById('plan-raw').textContent = planDataRaw;
                document.getElementById('timeline-fallback').style.display = 'block';
            }
        })();

        function escapeHtml(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function copyShareLink() {
            var copyText = document.getElementById("shareLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("リンクをクリップボードにコピーしました！");
        }
    </script>
    <script th:if="${apiKey}"
        th:src="'https://maps.googleapis.com/maps/api/js?key=' + ${apiKey} + '&libraries=places,geometry&language=ja&callback=initMapWrapper'"
        async defer></script>
</body>

</html>
