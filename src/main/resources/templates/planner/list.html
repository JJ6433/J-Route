<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headFragment}"></head>
<body class="d-flex flex-column min-vh-100">
    <header th:replace="~{fragments/header :: headerFragment}"></header>
    <main class="container mt-4 mb-4 flex-grow-1">
        <div class="container mb-5">
            <h2 class="jroute-section-title"><i class="bi bi-journal-bookmark"></i> マイプラン一覧</h2>
            <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
            <div class="card jroute-card">
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between align-items-center" th:each="p : ${planners}">
                        <a th:href="@{/planner/detail(id=${p.plannerId})}" th:text="${p.title}">タイトル</a>
                        <span class="text-muted small" th:text="${#temporals.format(p.createdAt, 'yyyy/MM/dd')}"></span>
                    </li>
                    <li class="list-group-item text-muted text-center" th:if="${#lists.isEmpty(planners)}">保存したプランはありません。</li>
                </ul>
            </div>
            <a th:href="@{/planner/form}" class="btn jroute-btn-primary mt-3">新しいプランを作成</a>
        </div>
    </main>
    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>
</body>
</html>
