<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: headFragment}"></head>

<!-- Add custom styles for the Wizard -->
<style>
    .step-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2rem;
        position: relative;
    }

    .step-header::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 2px;
        background: #eee;
        z-index: 1;
    }

    .step-node {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        z-index: 2;
        transition: all 0.3s;
    }

    .step-node.active {
        background: #ff4d4f;
        border-color: #ff4d4f;
        color: white;
    }

    .step-node.completed {
        background: #52c41a;
        border-color: #52c41a;
        color: white;
    }

    .wizard-step {
        display: none;
    }

    .wizard-step.active {
        display: block;
        animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .city-card {
        cursor: pointer;
        transition: all 0.3s;
        border: 2px solid transparent;
        overflow: hidden;
    }

    .city-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .city-card.selected {
        border-color: #ff4d4f;
        background-color: rgba(255, 77, 79, 0.05);
    }

    .city-card img {
        height: 120px;
        object-fit: cover;
    }

    #hotel-map {
        height: 400px;
        border-radius: 12px;
        margin-bottom: 1rem;
    }

    .hotel-info-card {
        border: 2px solid #eee;
        padding: 1rem;
        border-radius: 12px;
        display: none;
        margin-top: 1rem;
    }

    .hotel-info-card.active {
        display: block;
        border-color: #ff4d4f;
    }
</style>

<body class="d-flex flex-column min-vh-100">
    <header th:replace="~{fragments/header :: headerFragment}"></header>
    <main class="container mt-4 mb-4 flex-grow-1">
        <div class="container mb-5">
            <h2 class="jroute-section-title text-center mb-4"><i class="bi bi-magic"></i> AI旅行プランナー</h2>

            <!-- Wizard Headers -->
            <div class="row justify-content-center mb-5">
                <div class="col-md-8">
                    <div class="step-header">
                        <div class="step-node active" id="node-1">1</div>
                        <div class="step-node" id="node-2">2</div>
                        <div class="step-node" id="node-3">3</div>
                        <div class="step-node" id="node-4">4</div>
                    </div>
                    <div class="d-flex justify-content-between px-2 text-muted small">
                        <span>都市を選択</span>
                        <span>宿を選択</span>
                        <span>詳細設定</span>
                        <span>生成中</span>
                    </div>
                </div>
            </div>

            <form id="planner-form" th:action="@{/planner/generate}" method="post">
                <!-- Step 1: City Selection -->
                <div class="wizard-step active" id="step-1">
                    <h4 class="text-center mb-4">どちらへご旅行ですか？</h4>
                    <div class="row g-3">
                        <div class="col-6 col-md-3">
                            <div class="card city-card" onclick="selectCity('東京', this)">
                                <img src="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=500&q=80"
                                    class="card-img-top" alt="東京" style="height: 150px; object-fit: cover;">
                                <div class="card-body p-2 text-center">
                                    <h6 class="mb-0">東京</h6>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="card city-card" onclick="selectCity('大阪', this)">
                                <img src="https://images.unsplash.com/photo-1590559899731-a382839e5549?w=500&q=80"
                                    class="card-img-top" alt="大阪" style="height: 150px; object-fit: cover;">
                                <div class="card-body p-2 text-center">
                                    <h6 class="mb-0">大阪</h6>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="card city-card" onclick="selectCity('福岡', this)">
                                <img src="https://images.unsplash.com/photo-1578469645742-46cae010e5d4?w=500&q=80"
                                    class="card-img-top" alt="福岡" style="height: 150px; object-fit: cover;">
                                <div class="card-body p-2 text-center">
                                    <h6 class="mb-0">福岡</h6>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="card city-card" onclick="selectCity('札幌', this)">
                                <img src="/images/sapporo_city.png" class="card-img-top" alt="札幌"
                                    style="height: 150px; object-fit: cover;">
                                <div class="card-body p-2 text-center">
                                    <h6 class="mb-0">札幌</h6>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="card city-card" onclick="selectCity('沖縄', this)">
                                <img src="/images/okinawa_city.png" class="card-img-top" alt="沖縄"
                                    style="height: 150px; object-fit: cover;">
                                <div class="card-body p-2 text-center">
                                    <h6 class="mb-0">沖縄</h6>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="card city-card" onclick="selectCity('名古屋', this)">
                                <img src="/images/nagoya_city.png" class="card-img-top" alt="名古屋"
                                    style="height: 150px; object-fit: cover;">
                                <div class="card-body p-2 text-center">
                                    <h6 class="mb-0">名古屋</h6>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="card city-card" onclick="selectCity('静岡', this)">
                                <img src="/images/shizuoka_city.png" class="card-img-top" alt="静岡"
                                    style="height: 150px; object-fit: cover;">
                                <div class="card-body p-2 text-center">
                                    <h6 class="mb-0">静岡</h6>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="card city-card" onclick="selectCity('広島', this)">
                                <img src="/images/hiroshima_city.png" class="card-img-top" alt="広島"
                                    style="height: 150px; object-fit: cover;">
                                <div class="card-body p-2 text-center">
                                    <h6 class="mb-0">広島</h6>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" name="region" id="region-input" required>
                    <div class="text-center mt-5">
                        <button type="button" class="btn jroute-btn-primary px-5" onclick="nextStep(2)">次へ <i
                                class="bi bi-arrow-right"></i></button>
                    </div>
                </div>

                <!-- Step 2: Hotel Selection (List View) -->
                <div class="wizard-step" id="step-2">
                    <h4 class="text-center mb-4">ご滞在予定のエリア・宿を選択してください</h4>

                    <!-- Dynamic Hotel Grid -->
                    <div id="hotel-grid" class="row g-3 mb-4">
                        <!-- Hotels injected by JS -->
                    </div>

                    <div id="selected-hotel-info" class="hotel-info-card">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="flex-grow-1">
                                <h6 class="mb-1 fw-bold" id="display-hotel-name">宿泊施設名</h6>
                                <div class="d-flex flex-wrap gap-x-4 gap-y-1 small mt-1 mb-2">
                                    <span id="display-hotel-rating" class="text-secondary"><i class="bi bi-star-fill text-warning me-1"></i>評価: -</span>
                                    <span id="display-hotel-reviews" class="text-secondary"><i class="bi bi-chat-left-text me-1"></i>口コミ: -</span>
                                    <span id="display-hotel-price" class="text-danger fw-bold"><i class="bi bi-currency-yen me-1"></i>価格帯: -</span>
                                    <span id="display-hotel-languages" class="text-secondary"><i class="bi bi-translate me-1"></i>対応言語: -</span>
                                </div>
                                <p class="mb-0 text-muted small"><i class="bi bi-geo-alt-fill me-1"></i><span id="display-hotel-address-full">住所情報なし</span></p>
                            </div>
                            <span class="badge bg-success ms-3">選択済み</span>
                        </div>
                    </div>

                    <!-- Fallback / Custom Hotel Input (Optional) -->
                    <div class="mt-4 p-3 bg-light rounded text-center">
                        <p class="text-muted small mb-2">リストにご希望の宿がない場合は直接入力してください。</p>
                        <div class="input-group input-group-sm w-75 mx-auto">
                            <input type="text" class="form-control" id="custom-hotel-name"
                                placeholder="ホテル名 (例: 帝国ホテル)">
                            <button class="btn btn-outline-danger" type="button" onclick="setCustomHotel()">適用</button>
                        </div>
                    </div>

                    <input type="hidden" name="accommodationName" id="hotel-name-input">
                    <input type="hidden" name="accommodationAddress" id="hotel-address-input">

                    <div class="d-flex justify-content-between mt-4">
                        <button type="button" class="btn btn-outline-secondary px-4" onclick="prevStep(1)">戻る</button>
                        <button type="button" class="btn jroute-btn-primary px-5" onclick="nextStep(3)">次へ <i
                                class="bi bi-arrow-right"></i></button>
                    </div>
                </div>

                <!-- Step 3: Details -->
                <div class="wizard-step" id="step-3">
                    <h4 class="text-center mb-4">最後に、旅行の詳細を教えてください</h4>
                    <div class="row g-4 justify-content-center">
                        <div class="col-md-6">
                            <div class="card jroute-card p-4">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">旅行期間</label>
                                    <div class="input-group">
                                        <input type="date" name="startDate" class="form-control" required
                                            id="startDate">
                                        <span class="input-group-text">~</span>
                                        <input type="date" name="endDate" class="form-control" required id="endDate">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">大人</label>
                                            <input type="number" name="adults" class="form-control" value="2" min="1">
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">子供</label>
                                            <input type="number" name="children" class="form-control" value="0" min="0">
                                        </div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">旅行のテーマ</label>
                                    <select name="style" class="form-select">
                                        <option value="観光">観光メイン</option>
                                        <option value="グルメ">グルメ満喫</option>
                                        <option value="リラックス">温泉・リラックス</option>
                                        <option value="ショッピング">ショッピングと都会</option>
                                    </select>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-bold">同行者</label>
                                    <select name="companion" class="form-select">
                                        <option value="カップル">カップル</option>
                                        <option value="友達">友達</option>
                                        <option value="家族">家族</option>
                                        <option value="一人旅">一人旅</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn jroute-btn-primary w-100 py-3 fw-bold">
                                    AI旅行プランナーを起動する <i class="bi bi-lightning-fill"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <button type="button" class="btn btn-link text-decoration-none text-muted"
                            onclick="prevStep(2)">前のステップへ</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="position-fixed top-0 start-0 w-100 h-100 d-none"
        style="background: rgba(255,255,255,0.9); z-index: 9999;">
        <div class="d-flex flex-column align-items-center justify-content-center h-100">
            <div class="spinner-grow text-danger mb-4" style="width: 4rem; height: 4rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <h3 class="fw-bold mb-2 text-dark">AIが旅行プランを作成しています...</h3>
            <p class="text-muted">選択した宿を拠点として、天気と動線を分析中です。</p>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>

    <script th:inline="javascript">
        let currentStep = 1;
        let selectedRegion = '';



        function selectCity(city, element) {
            selectedRegion = city;
            document.getElementById('region-input').value = city;

            // Highlight card
            document.querySelectorAll('.city-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
        }

        function nextStep(step) {
            if (step === 2 && !selectedRegion) {
                alert('先に都市を選択してください！');
                return;
            }

            // Transition Step
            document.querySelectorAll('.wizard-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');

            // Update Nodes
            document.querySelectorAll('.step-node').forEach((node, idx) => {
                if (idx + 1 < step) node.className = 'step-node completed';
                else if (idx + 1 === step) node.className = 'step-node active';
                else node.className = 'step-node';
            });

            if (step === 2) {
                renderHotelGrid();
            }

            currentStep = step;
            window.scrollTo(0, 0);
        }

        function prevStep(step) {
            document.querySelectorAll('.wizard-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');

            document.querySelectorAll('.step-node').forEach((node, idx) => {
                if (idx + 1 < step) node.className = 'step-node completed';
                else if (idx + 1 === step) node.className = 'step-node active';
                else node.className = 'step-node';
            });

            currentStep = step;
            window.scrollTo(0, 0);
        }

        function renderHotelGrid() {
            const grid = document.getElementById('hotel-grid');
            if (!grid) return;
            
            grid.innerHTML = `
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-danger" role="status"></div>
                    <p class="mt-2 text-muted">「${selectedRegion}」周辺の宿泊施設を検索中です...</p>
                </div>
            `;

            fetch(`/api/hotels/search?city=${encodeURIComponent(selectedRegion)}`)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    grid.innerHTML = '';
                    
                    if (data.error || !data.data || !data.data.hotels || data.data.hotels.length === 0) {
                        const errorMsg = data.error || "宿泊施設情報を取得できませんでした。";
                        grid.innerHTML = `<div class="col-11 text-center py-4 alert alert-warning mx-auto">${errorMsg}<br>別の都市を選択するか、直接入力してください。</div>`;
                        return;
                    }

                    const hotels = data.data.hotels.slice(0, 8); // 최대 8개 표시

                    hotels.forEach(hotel => {
                        const prop = hotel.property;
                        if (!prop) return;

                        let hotelName = prop.name || "宿泊施設";
                        const photoUrl = (prop.photoUrls && prop.photoUrls.length > 0) ? prop.photoUrls[0] : 'https://placehold.co/300x200/e9ecef/6c757d?text=No+Image';
                        const address = prop.wishlistName || selectedRegion;
                        // 상세 주소 및 언어 (API에서 제공하는 경우)
                        const fullAddress = prop.address || prop.wishlistName || "住所情報なし";
                        const languages = (hotel.languages && hotel.languages.length > 0) ? hotel.languages.join(', ') : "日本語、英語など";
                        
                        // 추가 정보 추출
                        const rating = prop.reviewScore || "なし";
                        const reviews = prop.reviewCount || "0";
                        const price = (prop.priceBreakdown && prop.priceBreakdown.grossAmount) ? 
                                      Math.round(prop.priceBreakdown.grossAmount.value).toLocaleString() + "円" : "情報なし";

                        const col = document.createElement('div');
                        col.className = 'col-6 col-md-3';
                        col.innerHTML = `
                            <div class="card city-card" onclick="selectHotel('${hotelName.replace(/'/g, "\\'")}', '${address.replace(/'/g, "\\'")}', this, '${rating}', '${reviews}', '${price}', '${fullAddress.replace(/'/g, "\\'")}', '${languages.replace(/'/g, "\\'")}')">
                                <img src="${photoUrl}" class="card-img-top" alt="${hotelName}" style="height: 100px; object-fit: cover;">
                                <div class="card-body p-2 text-center">
                                    <h6 class="mb-1 text-truncate" style="font-size: 0.9rem;" title="${hotelName}">${hotelName}</h6>
                                    <div class="small text-warning mb-1">
                                        <i class="bi bi-star-fill"></i> ${rating}
                                    </div>
                                    <small class="text-muted d-block text-truncate">${address}</small>
                                </div>
                            </div>
                        `;
                        grid.appendChild(col);
                    });
                })
                .catch(error => {
                    console.error('Error fetching hotels:', error);
                    grid.innerHTML = `<div class="col-12 text-center py-4 alert alert-danger">通信エラーが発生しました。 (${error.message})</div>`;
                });
        }

        function selectHotel(name, address, element, rating = "-", reviews = "-", price = "-", fullAddress = "-", languages = "-") {
            document.getElementById('hotel-name-input').value = name;
            document.getElementById('hotel-address-input').value = fullAddress !== "-" ? fullAddress : address;

            document.getElementById('display-hotel-name').innerText = name;
            document.getElementById('display-hotel-address-full').innerText = fullAddress !== "-" ? fullAddress : address;
            
            // 상세 정보 표시
            document.getElementById('display-hotel-rating').innerHTML = `<i class="bi bi-star-fill text-warning me-1"></i>評価: ${rating}`;
            document.getElementById('display-hotel-reviews').innerHTML = `<i class="bi bi-chat-left-text me-1"></i>口コミ: ${reviews}`;
            document.getElementById('display-hotel-price').innerHTML = `<i class="bi bi-currency-yen me-1"></i>価格帯: ${price}`;
            document.getElementById('display-hotel-languages').innerHTML = `<i class="bi bi-translate me-1"></i>対応言語: ${languages}`;
            
            document.getElementById('selected-hotel-info').classList.add('active');

            // Highlight selected
            if (element) {
                document.querySelectorAll('#hotel-grid .city-card').forEach(card => card.classList.remove('selected'));
                element.classList.add('selected');
            }
        }

        function setCustomHotel() {
            const name = document.getElementById('custom-hotel-name').value;
            if (!name) return;
            selectHotel(name, 'カスタム入力', null);
            document.querySelectorAll('#hotel-grid .city-card').forEach(card => card.classList.remove('selected'));
        }

        document.getElementById('planner-form').addEventListener('submit', function (e) {
            // Validation
            const hotelName = document.getElementById('hotel-name-input').value;
            if (!hotelName) {
                e.preventDefault();
                alert('リストから宿を選択するか、直接入力してください！');
                return;
            }

            document.getElementById('loading-overlay').classList.remove('d-none');
            // Change last node to active
            document.getElementById('node-4').className = 'step-node active';
            document.getElementById('node-3').className = 'step-node completed';
        });

        // Set default dates
        const today = new Date();
        const nextWeek = new Date(today);
        nextWeek.setDate(today.getDate() + 7);
        const dayAfter = new Date(nextWeek);
        dayAfter.setDate(nextWeek.getDate() + 2);

        document.getElementById('startDate').valueAsDate = nextWeek;
        document.getElementById('endDate').valueAsDate = dayAfter;
    </script>
</body>

</html>
