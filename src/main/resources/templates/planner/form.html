<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: headFragment}"></head>

<!-- Add custom styles for the Wizard -->
<style>
    .step-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2rem;
        position: relative;
    }

    .step-header::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 2px;
        background: #eee;
        z-index: 1;
    }

    .step-node {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        z-index: 2;
        transition: all 0.3s;
    }

    .step-node.active {
        background: #ff4d4f;
        border-color: #ff4d4f;
        color: white;
    }

    .step-node.completed {
        background: #52c41a;
        border-color: #52c41a;
        color: white;
    }

    .wizard-step {
        display: none;
    }

    .wizard-step.active {
        display: block;
        animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .city-card {
        cursor: pointer;
        transition: all 0.3s;
        border: 2px solid transparent;
        overflow: hidden;
    }

    .city-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .city-card.selected {
        border-color: #ff4d4f;
        background-color: rgba(255, 77, 79, 0.05);
    }

    .city-card img {
        height: 120px;
        object-fit: cover;
    }

    #hotel-map {
        height: 400px;
        border-radius: 12px;
        margin-bottom: 1rem;
    }

    .hotel-info-card {
        border: 2px solid #eee;
        padding: 1rem;
        border-radius: 12px;
        display: none;
        margin-top: 1rem;
    }

    .hotel-info-card.active {
        display: block;
        border-color: #ff4d4f;
    }
</style>

        function selectCity(city, element) {
            selectedRegion = city;
            document.getElementById('region-input').value = city;

            // Highlight card
            document.querySelectorAll('.city-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
        }

        function nextStep(step) {
            if (step === 2 && !selectedRegion) {
                alert('先に都市を選択してください！');
                return;
            }

            // Transition Step
            document.querySelectorAll('.wizard-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');

            // Update Nodes
            document.querySelectorAll('.step-node').forEach((node, idx) => {
                if (idx + 1 < step) node.className = 'step-node completed';
                else if (idx + 1 === step) node.className = 'step-node active';
                else node.className = 'step-node';
            });

            if (step === 2) {
                renderHotelGrid();
            }

            currentStep = step;
            window.scrollTo(0, 0);
        }

        function prevStep(step) {
            document.querySelectorAll('.wizard-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');

            document.querySelectorAll('.step-node').forEach((node, idx) => {
                if (idx + 1 < step) node.className = 'step-node completed';
                else if (idx + 1 === step) node.className = 'step-node active';
                else node.className = 'step-node';
            });

            currentStep = step;
            window.scrollTo(0, 0);
        }

        function renderHotelGrid() {
            const grid = document.getElementById('hotel-grid');
            grid.innerHTML = '';

            const hotels = regionHotels[selectedRegion] || regionHotels['デフォルト'];

            hotels.forEach(hotel => {
                const col = document.createElement('div');
                col.className = 'col-6 col-md-3';
                col.innerHTML = `
                    <div class="card city-card" onclick="selectHotel('${hotel.name}', '${hotel.address}', this)">
                        <img src="${hotel.img}" class="card-img-top" alt="${hotel.name}" style="height: 100px;">
                        <div class="card-body p-2 text-center">
                            <h6 class="mb-1" style="font-size: 0.9rem;">${hotel.name}</h6>
                            <small class="text-muted d-block text-truncate">${hotel.address}</small>
                        </div>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        function selectHotel(name, address, element) {
            document.getElementById('hotel-name-input').value = name;
            document.getElementById('hotel-address-input').value = address;

            document.getElementById('display-hotel-name').innerText = name;
            document.getElementById('display-hotel-address').innerText = address;
            document.getElementById('selected-hotel-info').classList.add('active');

            // Highlight selected
            if (element) {
                document.querySelectorAll('#hotel-grid .city-card').forEach(card => card.classList.remove('selected'));
                element.classList.add('selected');
            }
        }

        function setCustomHotel() {
            const name = document.getElementById('custom-hotel-name').value;
            if (!name) return;
            selectHotel(name, 'カスタム入力', null);
            document.querySelectorAll('#hotel-grid .city-card').forEach(card => card.classList.remove('selected'));
        }

        document.getElementById('planner-form').addEventListener('submit', function (e) {
            // Validation
            const hotelName = document.getElementById('hotel-name-input').value;
            if (!hotelName) {
                e.preventDefault();
                alert('リストから宿を選択するか、直接入力してください！');
                return;
            }

            document.getElementById('loading-overlay').classList.remove('d-none');
            // Change last node to active
            document.getElementById('node-4').className = 'step-node active';
            document.getElementById('node-3').className = 'step-node completed';
        });

        // Set default dates
        const today = new Date();
        const nextWeek = new Date(today);
        nextWeek.setDate(today.getDate() + 7);
        const dayAfter = new Date(nextWeek);
        dayAfter.setDate(nextWeek.getDate() + 2);

        document.getElementById('startDate').valueAsDate = nextWeek;
        document.getElementById('endDate').valueAsDate = dayAfter;
    </script>
