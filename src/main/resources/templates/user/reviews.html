<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: headFragment}"></head>

<body class="d-flex flex-column min-vh-100">
    <header th:replace="~{fragments/header :: headerFragment}"></header>
    <main class="container mt-5 mb-5 flex-grow-1">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/mypage}" class="btn btn-light rounded-circle me-3"><i class="bi bi-arrow-left"></i></a>
            <h2 class="fw-bold mb-0">作成したレビュー</h2>
        </div>

        <div class="list-group list-group-flush shadow-sm rounded-4 overflow-hidden border"
            th:if="${!#lists.isEmpty(reviews)}">
            <div th:each="review : ${reviews}" class="list-group-item p-4 bg-white hover-shadow transition">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <h5 class="fw-bold mb-1" th:text="${review.placeName}">場所名</h5>
                        <div class="text-warning small mb-2">
                            <i th:each="i : ${#numbers.sequence(1, 5)}"
                                th:class="${review.rating >= i ? 'bi bi-star-fill' : 'bi bi-star'}"></i>
                            <span class="ms-2 text-dark opacity-75 fw-normal" th:text="${review.rating}">5</span>.0
                        </div>
                    </div>
                    <div class="text-end text-muted small">
                        <i class="bi bi-pencil-square me-1"></i> <span
                            th:text="${#temporals.format(review.createdAt, 'yyyy/MM/dd HH:mm')}">2023/10/01 12:00</span>
                    </div>
                </div>
                <p class="card-text mb-3 text-secondary" style="white-space: pre-wrap;" th:text="${review.content}">
                    レビューの内容...</p>
                <div class="d-flex gap-2">
                    <a th:href="@{/place/detail(id=${review.placeId})}" class="btn btn-light btn-sm rounded-pill px-3">
                        場所を確認 <i class="bi bi-chevron-right small"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="text-center py-5 bg-light rounded-4" th:if="${#lists.isEmpty(reviews)}">
            <div class="display-1 text-muted opacity-25 mb-3"><i class="bi bi-chat-left-dots"></i></div>
            <h4 class="text-muted">作成したレビューがありません。</h4>
            <p class="text-muted mb-4">旅行先の感想をみんなに共有してみましょう！</p>
            <a th:href="@{/place/list}" class="btn jroute-btn-search px-4">旅行先を探す</a>
        </div>
    </main>
    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>

    <style>
        .hover-shadow:hover {
            background-color: #f8f9fa !important;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.02);
        }

        .transition {
            transition: all 0.2s ease;
        }
    </style>
</body>

</html>
