<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: headFragment}">
    <title>予約履歴 - J-Route</title>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <header th:replace="~{fragments/header :: headerFragment}"></header>

    <main class="container mt-5 mb-5 flex-grow-1" style="max-width: 900px;">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/mypage}" class="btn btn-outline-secondary rounded-circle me-3" style="width: 40px; height: 40px; padding: 7px;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h3 class="fw-bold mb-0"><i class="bi bi-ticket-detailed-fill text-warning me-2"></i>予約履歴</h3>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-0">
                
                <ul class="nav nav-tabs nav-fill bg-white border-bottom-0 pt-3 px-3" id="reservationTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active fw-bold py-3" id="hotel-res-tab" data-bs-toggle="tab" data-bs-target="#hotel-res" type="button" role="tab"><i class="bi bi-building-fill me-1"></i> 宿泊先</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link fw-bold py-3" id="flight-res-tab" data-bs-toggle="tab" data-bs-target="#flight-res" type="button" role="tab"><i class="bi bi-airplane-fill me-1"></i> 航空券</button>
                    </li>
                </ul>

                <div class="tab-content p-4 p-md-5 bg-white" id="reservationTabsContent">
                    
                    <div class="tab-pane fade show active" id="hotel-res" role="tabpanel">
                        <div th:if="${!#lists.isEmpty(reservations.?[category == 'HOTEL'])}">
                            <div th:each="res : ${reservations}" th:if="${res.category == 'HOTEL'}" 
                                 class="card border border-light shadow-sm mb-4 rounded-4 transition-hover" 
                                 style="cursor: pointer;"
                                 th:data-url="@{/mypage/reservation/detail(orderId=${res.orderId})}"
                                 onclick="location.href=this.getAttribute('data-url')">
                                <div class="card-body p-4">
                                    <div class="row align-items-center">
                                        <div class="col-md-8">
                                            <div class="d-flex justify-content-between align-items-center mb-2">
                                                <span class="badge bg-primary fs-6"><i class="bi bi-building-fill me-1"></i> 宿泊先</span>
                                                <div class="text-end">
                                                    <small class="text-muted d-block">予約日: <span th:text="${#dates.format(res.createdAt, 'yyyy/MM/dd HH:mm')}"></span></small>
                                                    <small class="text-muted" style="font-size: 0.7rem;">注文番号: <span th:text="${res.orderId}"></span></small>
                                                </div>
                                            </div>
                                            <h5 class="fw-bold mt-3 mb-1 text-dark d-flex align-items-center">
                                                <span th:text="${res.itemName}">商品名</span>
                                            </h5>
                                            <div class="mt-2">
                                                <span class="badge bg-success-subtle text-success"><i class="bi bi-check-circle-fill me-1"></i> 決済完了</span>
                                            </div>
                                        </div>
                                        <div class="col-md-4 text-md-end mt-3 mt-md-0 border-start-md pl-md-4">
                                            <p class="text-muted small mb-1">決済金額</p>
                                            <h3 class="text-danger fw-bold mb-0" th:text="'¥' + ${#numbers.formatInteger(res.amount, 3, 'COMMA')}">¥0</h3>
                                            <p class="small text-primary mt-2 mb-0 fw-bold">詳細を見る <i class="bi bi-chevron-right"></i></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="text-center py-5" th:if="${#lists.isEmpty(reservations.?[category == 'HOTEL'])}">
                            <div class="display-1 text-light mb-3"><i class="bi bi-building"></i></div>
                            <h4 class="fw-bold text-secondary">宿泊先の予約履歴がありません。</h4>
                            <p class="text-muted mt-2">日本への素晴らしい旅行を計画してみませんか？</p>
                            <a href="/trip/hotels" class="btn btn-primary rounded-pill px-4 mt-3 fw-bold shadow-sm">宿泊先を探す</a>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="flight-res" role="tabpanel">
                        <div th:if="${!#lists.isEmpty(reservations.?[category == 'FLIGHT'])}">
                            <div th:each="res : ${reservations}" th:if="${res.category == 'FLIGHT'}" 
                                 class="card border border-light shadow-sm mb-4 rounded-4 transition-hover" 
                                 style="cursor: pointer;"
                                 th:data-url="@{/mypage/reservation/detail(orderId=${res.orderId})}"
                                 onclick="location.href=this.getAttribute('data-url')">
                                <div class="card-body p-4">
                                    <div class="row align-items-center">
                                        <div class="col-md-8">
                                            <div class="d-flex justify-content-between align-items-center mb-2">
                                                <span class="badge bg-info text-dark fs-6"><i class="bi bi-airplane-fill me-1"></i> 航空券</span>
                                                <div class="text-end">
                                                    <small class="text-muted d-block">予約日: <span th:text="${#dates.format(res.createdAt, 'yyyy/MM/dd HH:mm')}"></span></small>
                                                    <small class="text-muted" style="font-size: 0.7rem;">注文番号: <span th:text="${res.orderId}"></span></small>
                                                </div>
                                            </div>
                                            <h5 class="fw-bold mt-3 mb-1 text-dark d-flex align-items-center">
                                                <span th:text="${res.itemName}">商品名</span>
                                            </h5>
                                            <div class="mt-2">
                                                <span class="badge bg-success-subtle text-success"><i class="bi bi-check-circle-fill me-1"></i> 決済完了</span>
                                            </div>
                                        </div>
                                        <div class="col-md-4 text-md-end mt-3 mt-md-0 border-start-md pl-md-4">
                                            <p class="text-muted small mb-1">決済金額</p>
                                            <h3 class="text-danger fw-bold mb-0" th:text="'¥' + ${#numbers.formatInteger(res.amount, 3, 'COMMA')}">¥0</h3>
                                            <p class="small text-primary mt-2 mb-0 fw-bold">詳細を見る <i class="bi bi-chevron-right"></i></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="text-center py-5" th:if="${#lists.isEmpty(reservations.?[category == 'FLIGHT'])}">
                            <div class="display-1 text-light mb-3"><i class="bi bi-airplane-engines"></i></div>
                            <h4 class="fw-bold text-secondary">航空券の予約履歴がありません。</h4>
                            <p class="text-muted mt-2">日本への素晴らしい旅行を計画してみませんか？</p>
                            <a href="/trip/flights" class="btn btn-primary rounded-pill px-4 mt-3 fw-bold shadow-sm">航空券を探す</a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>

    <style>
        .nav-tabs .nav-link { color: #6c757d; border: none; border-bottom: 3px solid transparent; }
        .nav-tabs .nav-link.active { color: #003580; background-color: transparent; border-color: transparent transparent #003580 transparent; }
        .nav-tabs .nav-link:hover:not(.active) { border-color: transparent transparent #e9ecef transparent; }
        
        .transition-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; border: 1px solid rgba(0,0,0,0.05) !important; }
        .transition-hover:hover { transform: translateY(-5px); box-shadow: 0 .5rem 1.5rem rgba(0,0,0,.1) !important; border-color: #003580 !important; }
        
        @media (min-width: 768px) { .border-start-md { border-left: 1px dashed #dee2e6; } }
        .bg-success-subtle { background-color: #e6f9f0 !important; }
    </style>
</body>
</html>
