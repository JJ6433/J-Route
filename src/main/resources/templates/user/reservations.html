<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: headFragment}">
    <title>予約履歴 - J-Route</title>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <header th:replace="~{fragments/header :: headerFragment}"></header>

    <main class="container mt-5 mb-5 flex-grow-1" style="max-width: 900px;">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/mypage}" class="btn btn-outline-secondary rounded-circle me-3" style="width: 40px; height: 40px; padding: 7px;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h3 class="fw-bold mb-0"><i class="bi bi-ticket-detailed-fill text-warning me-2"></i>予約履歴</h3>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-4 p-md-5">
                
                <div th:if="${!#lists.isEmpty(reservations)}">
                    <div th:each="res : ${reservations}" class="card border border-light shadow-sm mb-4 rounded-4 transition-hover">
                        <div class="card-body p-4">
                            <div class="row align-items-center">
                                <div class="col-md-8">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span th:if="${res.category == 'FLIGHT'}" class="badge bg-info text-dark fs-6"><i class="bi bi-airplane-fill me-1"></i> 航空券</span>
                                        <span th:if="${res.category == 'HOTEL'}" class="badge bg-primary fs-6"><i class="bi bi-building-fill me-1"></i> 宿泊先</span>
                                        
                                        <div class="text-end">
                                            <small class="text-muted d-block">予約日: <span th:text="${#dates.format(res.createdAt, 'yyyy/MM/dd HH:mm')}">2026/03/05</span></small>
                                            <small class="text-muted" style="font-size: 0.7rem;">注文番号: <span th:text="${res.orderId}">ORD-123</span></small>
                                        </div>
                                    </div>
                                    <h5 class="fw-bold mt-3 mb-1 text-dark" th:text="${res.itemName}">商品名</h5>
                                    
                                    <div class="mt-2">
                                        <span class="badge bg-success-subtle text-success"><i class="bi bi-check-circle-fill me-1"></i> 決済完了</span>
                                    </div>
                                </div>
                                
                                <div class="col-md-4 text-md-end mt-3 mt-md-0 border-start-md pl-md-4">
                                    <p class="text-muted small mb-1">決済金額</p>
                                    <h3 class="text-danger fw-bold mb-0" th:text="'¥' + ${#numbers.formatInteger(res.amount, 3, 'COMMA')}">¥0</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center py-5" th:if="${#lists.isEmpty(reservations)}">
                    <div class="display-1 text-light mb-3"><i class="bi bi-inbox-fill"></i></div>
                    <h4 class="fw-bold text-secondary">予約履歴がありません。</h4>
                    <p class="text-muted mt-2">日本への素晴らしい旅行を計画してみませんか？</p>
                    <a href="/" class="btn btn-primary rounded-pill px-4 mt-3 fw-bold shadow-sm">旅行を探す</a>
                </div>

            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>

    <style>
        .transition-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .transition-hover:hover { transform: translateY(-3px); box-shadow: 0 .5rem 1.5rem rgba(0,0,0,.1) !important; border-color: #003580 !important; }
        @media (min-width: 768px) { .border-start-md { border-left: 1px solid #eee; } }
    </style>
</body>
</html>
