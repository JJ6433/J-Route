<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headFragment}"></head>
<body class="d-flex flex-column min-vh-100">
    <header th:replace="~{fragments/header :: headerFragment}"></header>
    <main class="container mt-4 mb-4 flex-grow-1">
        <div class="container mb-5">
            <div class="row justify-content-center">
                <div class="col-md-4">
                    <h2 class="jroute-section-title"><i class="bi bi-box-arrow-in-right"></i> ログイン</h2>
                    <p th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></p>
                    <div class="card jroute-card">
                        <div class="card-body p-4">
                            <form th:action="@{/loginProc}" method="post">
                                <div class="mb-3">
                                    <label class="form-label">ユーザーID</label>
                                    <input type="text" name="username" class="form-control" required placeholder="ユーザーID"/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">パスワード</label>
                                    <input type="password" name="password" class="form-control" required placeholder="パスワード"/>
                                </div>
                                <button type="submit" class="btn jroute-btn-primary w-100">ログイン</button>
                                <a th:href="@{/user/signup}" class="btn btn-outline-view mt-2 w-100">会員登録</a>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>
</body>
</html>
