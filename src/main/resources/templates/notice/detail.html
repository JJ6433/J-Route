<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/default}">

<head>
    <title th:text="${notice.title} + ' - お知らせ'">お知らせ</title>
</head>

<body>
    <main layout:fragment="content" class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-success">ホーム</a>
                        </li>
                        <li class="breadcrumb-item active" aria-current="page">お知らせ</li>
                    </ol>
                </nav>

                <article class="card shadow-sm border-0" style="border-radius: 15px;">
                    <div class="card-body p-4 p-md-5">
                        <header class="mb-4 border-bottom pb-3">
                            <span class="badge bg-success mb-2">お知らせ</span>
                            <h1 class="fw-bold h2 mb-3" th:text="${notice.title}">お知らせタイトル</h1>
                            <div class="text-muted small">
                                <i class="bi bi-clock me-1"></i>
                                <span
                                    th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">2026-02-23</span>
                            </div>
                        </header>

                        <div class="notice-content lh-lg" style="white-space: pre-wrap; font-size: 1.1rem;"
                            th:text="${notice.content}">
                            お知らせの内容がここに表示されます。
                        </div>

                        <div class="mt-5 pt-4 border-top text-center">
                            <a th:href="@{/}" class="btn btn-outline-success px-5 rounded-pill">
                                <i class="bi bi-arrow-left me-2"></i> 一覧に戻る
                            </a>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </main>
</body>

</html>
