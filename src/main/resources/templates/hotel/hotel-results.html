<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: headFragment}">
    <title>宿泊先検索結果 - J-Route</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <div style="position: relative; z-index: 1050;">
        <header th:replace="~{fragments/header :: headerFragment}"></header>
    </div>

    <div class="container py-5 flex-grow-1">
        <h2 class="mb-4 text-center fw-bold"><i class="bi bi-building text-primary me-2"></i>宿泊先検索結果</h2>
        
        <div class="text-center py-5" id="loading">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">条件に合う宿泊先を検索中です...</p>
        </div>

        <div class="row d-none" id="main-content">
            <div class="col-md-3 mb-4">
                <div class="card border-0 shadow-sm" style="border-radius: 15px; position: sticky; top: 20px;">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4"><i class="bi bi-funnel me-2"></i>絞り込み</h5>
                        
                        <div class="mb-4">
                            <label class="fw-bold text-dark small mb-2">最大料金 (合計)</label>
                            <input type="range" class="form-range" id="priceFilter" min="5000" max="100000" step="5000" value="100000" oninput="updatePriceLabel(this.value); applyFilters();">
                            <div class="d-flex justify-content-between text-muted small mt-1">
                                <span>¥5,000</span>
                                <span id="priceLabel" class="fw-bold text-primary">¥100,000</span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="fw-bold text-dark small mb-2">クチコミ評価</label>
                            <div class="form-check mb-2">
                                <input class="form-check-input filter-score" type="radio" name="scoreFilter" id="score0" value="0" checked onchange="applyFilters()">
                                <label class="form-check-label small" for="score0">すべて</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input filter-score" type="radio" name="scoreFilter" id="score9" value="9" onchange="applyFilters()">
                                <label class="form-check-label small" for="score9">すばらしい: 9+</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input filter-score" type="radio" name="scoreFilter" id="score8" value="8" onchange="applyFilters()">
                                <label class="form-check-label small" for="score8">とても良い: 8+</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input filter-score" type="radio" name="scoreFilter" id="score7" value="7" onchange="applyFilters()">
                                <label class="form-check-label small" for="score7">良い: 7+</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="text-muted small mb-0" id="result-count"></p>
                </div>
                <div id="results-container"></div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>

    <script th:inline="javascript">
	    const rawData = [[${hotels}]];
	    let response;
	    try { response = JSON.parse(rawData); } catch (e) { response = {}; }
	
	    console.log("🏨 API 원본 데이터:", rawData); // 텍스트 원본 확인용
	    console.log("🏨 파싱된 데이터:", response);
	
	    // 전역 변수로 원본 데이터 보관
	    let allHotels = []; 
	
	    const loading = document.getElementById('loading');
	    const mainContent = document.getElementById('main-content');
	    const container = document.getElementById('results-container');
	    const countLabel = document.getElementById('result-count');
	    
	    const urlParams = new URLSearchParams(window.location.search);
        const checkinDate = urlParams.get('checkinDate');
        const checkoutDate = urlParams.get('checkoutDate');
        const adults = urlParams.get('adults');
	    
	    // --- (추가된 부분) 백엔드에서 명시적인 에러를 보냈을 경우 ---
	    if (response.error) {
	        loading.style.display = 'none';
	        mainContent.classList.remove('d-none');
	        mainContent.innerHTML = `
	            <div class="alert alert-danger border shadow-sm text-center py-5 rounded-4 col-12">
	                <i class="bi bi-x-octagon-fill text-danger mb-3" style="font-size: 3rem;"></i>
	                <h5 class="fw-bold">API 呼び出しエラーが発生しました</h5>
	                <p class="text-muted mt-2">${response.error}</p>
	            </div>
	        `;
	        throw new Error("API 에러 발생으로 렌더링을 중단합니다."); // 여기서 멈춤
	    }

        // 데이터가 정상적으로 1개 이상 있을 때
        if (response.status && response.data && response.data.hotels && response.data.hotels.length > 0) {
            loading.style.display = 'none';
            mainContent.classList.remove('d-none'); // UI 표시
            
            allHotels = response.data.hotels; // 원본 데이터 저장
            renderHotels(allHotels); // 최초 렌더링
        } else {
            // 🐛 버그 수정: 데이터가 없을 때 부모 요소의 숨김(d-none)을 강제로 해제합니다.
            loading.style.display = 'none';
            mainContent.classList.remove('d-none'); 
            
            // 사이드바를 지우고 넓게 에러 메시지 표시
            mainContent.innerHTML = `
                <div class="alert alert-light border shadow-sm text-center py-5 rounded-4 col-12">
                    <i class="bi bi-exclamation-triangle text-warning mb-3" style="font-size: 3rem;"></i>
                    <h5 class="fw-bold">検索結果がありません、またはAPIエラーです。</h5>
                    <p class="text-muted mt-2">F12(開発者ツール)のコンソールタブを開いて、<br>APIがどのようなエラーを返したか確認してください。</p>
                </div>
            `;
        }

        // 🌟 필터링 함수
        function applyFilters() {
            const maxPrice = parseInt(document.getElementById('priceFilter').value);
            const minScore = parseFloat(document.querySelector('input[name="scoreFilter"]:checked').value);

            const filteredHotels = allHotels.filter(hotel => {
                const prop = hotel.property;
                if (!prop) return false;

                let price = 0;
                if (prop.priceBreakdown && prop.priceBreakdown.grossPrice) {
                    price = prop.priceBreakdown.grossPrice.value || prop.priceBreakdown.grossPrice;
                }
                if (price > maxPrice) return false;

                let score = prop.reviewScore || 0;
                if (score < minScore) return false;

                return true; 
            });

            renderHotels(filteredHotels);
        }

        // 🌟 화면 렌더링 함수
        function renderHotels(hotelsToRender) {
            container.innerHTML = ''; 
            countLabel.innerHTML = `表示中: <b>${hotelsToRender.length}</b> 件`;

            if (hotelsToRender.length === 0) {
                container.innerHTML = `<div class="alert alert-warning text-center border-0 shadow-sm py-4">条件に合う宿泊先がありません。条件を緩めてください。</div>`;
                return;
            }

            hotelsToRender.forEach(hotel => {
                const prop = hotel.property;
                if (!prop) return;

                let hotelName = prop.name || "宿泊施設名なし";
                if (!prop.name && hotel.accessibilityLabel) hotelName = hotel.accessibilityLabel.split('\n')[0];

                const photoUrl = (prop.photoUrls && prop.photoUrls.length > 0) ? prop.photoUrls[0] : 'https://placehold.co/300x200/e9ecef/6c757d?text=No+Image';
                const score = prop.reviewScore ? prop.reviewScore.toFixed(1) : '-';
                const reviewCount = prop.reviewCount ? prop.reviewCount.toLocaleString() : '0';
                
                let badgeColor = "bg-secondary";
                if (prop.reviewScore >= 9.0) badgeColor = "bg-success";
                else if (prop.reviewScore >= 8.0) badgeColor = "bg-primary";
                else if (prop.reviewScore >= 7.0) badgeColor = "bg-warning text-dark";

                // 💡 수정된 부분: 결제용 순수 숫자(purePrice)를 명확하게 분리해서 선언합니다.
                let priceStr = "価格情報なし";
                let purePrice = 0; 
                if (prop.priceBreakdown && prop.priceBreakdown.grossPrice) {
                    const val = prop.priceBreakdown.grossPrice.value || prop.priceBreakdown.grossPrice;
                    if (!isNaN(val)) {
                        purePrice = Math.round(val);
                        priceStr = `¥${purePrice.toLocaleString()}`;
                    }
                }

                // 💡 수정된 부분: 에러 없이 깔끔하게 /checkout 으로 파라미터를 넘깁니다.

				// 기존 코드에 &category=HOTEL 추가
				const checkoutUrl = `/checkout?itemName=${encodeURIComponent(hotelName)}&price=${purePrice}&checkin=${checkinDate}&adults=${adults}&category=HOTEL`;
                
				const cardHtml = `
                    <div class="card border-0 shadow-sm mb-4 hotel-card overflow-hidden" style="border-radius: 15px;">
                        <div class="row g-0">
                            <div class="col-md-4">
                                <div class="h-100" style="min-height: 200px; background-image: url('${photoUrl}'); background-size: cover; background-position: center;"></div>
                            </div>
                            <div class="col-md-8">
                                <div class="card-body p-4 d-flex flex-column h-100 justify-content-between">
                                    <div>
                                        <div class="d-flex justify-content-between align-items-start mb-2">
                                            <h5 class="card-title fw-bold mb-0 text-dark">${hotelName}</h5>
                                            <span class="badge ${badgeColor} fs-6 ms-2">${score}</span>
                                        </div>
                                        <p class="text-muted small mb-3"><i class="bi bi-chat-square-text me-1"></i> クチコミ ${reviewCount} 件</p>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-end mt-3">
                                        <div>
                                            <p class="small text-muted mb-0">合計料金 (${adults}名)</p>
                                            <h4 class="text-danger fw-bold mb-0">${priceStr}</h4>
                                        </div>
                                        <button onclick="location.href='${checkoutUrl}'" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">
                                            予約手続きへ <i class="bi bi-credit-card ms-1"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += cardHtml;
            });
        }
    </script>

    <style>
        .hotel-card { transition: transform 0.2s ease, box-shadow 0.2s ease; border: 1px solid rgba(0,0,0,0.05); }
        .hotel-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; border-color: #003580; }
        .btn-primary { background-color: #003580; border: none; }
        .btn-primary:hover { background-color: #00224f; }
        input[type=range] { accent-color: #003580; } /* 슬라이더 색상 변경 */
    </style>
</body>
</html>
