<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head layout:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>J-Route - AIが考える失敗しない日本旅行</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/jroute.css}" href="/css/jroute.css">
    <style>
      body { font-family: "Noto Sans JP", sans-serif; color: #333; background: #fff; }
      .jroute-header { background: #fff !important; border-bottom: 1px solid #eee; box-shadow: 0 2px 6px rgba(0,0,0,.06); }
      .jroute-header .navbar-brand { font-weight: 700; color: #e74c3c !important; font-size: 1.35rem; }
      .jroute-header .navbar-brand i { color: #e74c3c; margin-right: 6px; }
      .jroute-header .nav-link { color: #333 !important; }
      .jroute-header .nav-link:hover { color: #e74c3c !important; }
      .jroute-btn-login, .jroute-btn-primary, .jroute-btn-search { background: #e74c3c !important; color: #fff !important; border: none !important; border-radius: 8px; padding: 10px 24px; font-weight: 500; text-decoration: none; display: inline-block; }
      .jroute-btn-primary:hover, .jroute-btn-search:hover { background: #c0392b !important; color: #fff !important; }
      .jroute-hero { background: linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)), url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=1600&amp;q=80') center/cover no-repeat; color: #fff; padding: 90px 0 110px; margin-bottom: 2rem; border-radius: 8px; min-height: 300px; }
      .jroute-hero h1 { font-weight: 700; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
      .jroute-hero .text-accent { color: #e74c3c; background: rgba(255,255,255,.95); padding: 4px 10px; border-radius: 6px; font-weight: 700; }
      .jroute-hero .lead { color: rgba(255,255,255,.95); }
      .jroute-section-title { font-size: 1.5rem; font-weight: 700; color: #333; margin-bottom: 1rem; }
      .jroute-card { background: #fff; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); overflow: hidden; }
      .jroute-search-bar { background: #f8f9fa; padding: 1rem 1.25rem; border-radius: 8px; margin-bottom: 1.5rem; }
      .jroute-footer { background: #2c3e50 !important; color: rgba(255,255,255,.9); padding: 1.5rem 0; margin-top: auto; }
      .jroute-footer a { color: rgba(255,255,255,.85); text-decoration: none; }
      .btn-outline-view { border: 1px solid #333; color: #333; border-radius: 8px; padding: 8px 16px; text-decoration: none; display: inline-block; background: transparent; }
      .btn-outline-view:hover { background: #f8f9fa; color: #333; }
      a.btn.jroute-btn-primary { color: #fff !important; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <style data-fallback="head-missing">body{font-family:"Noto Sans JP",sans-serif;color:#333;background:#fff}.jroute-header{background:#fff!important;border-bottom:1px solid #eee}.jroute-hero{background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=1600') center/cover;color:#fff;padding:90px 0 110px;min-height:300px}.jroute-btn-primary,.jroute-btn-search{background:#e74c3c!important;color:#fff!important;border-radius:8px;padding:10px 24px}.jroute-section-title{font-size:1.5rem;font-weight:700}.jroute-card{background:#fff;border:1px solid #eee;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1)}.jroute-footer{background:#2c3e50!important;color:rgba(255,255,255,.9)}</style>
    <header th:replace="~{fragments/header :: headerFragment}"></header>
    <main class="container mt-4 mb-4 flex-grow-1" layout:fragment="content">
        <!-- 各ページ本文 -->
    </main>
    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>
</body>
</html>
