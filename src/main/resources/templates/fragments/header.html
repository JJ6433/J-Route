<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<div th:fragment="headerFragment">
    <nav class="navbar navbar-expand-lg navbar-light jroute-header">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}"><i class="bi bi-geo-alt-fill"></i> J-Route</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">ホーム</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/place/list}">旅行検索</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/board/list}">掲示板</a></li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/}">管理画面</a>
                    </li>
                </ul>
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link jroute-btn-login btn btn-sm" th:href="@{/user/login}">ログイン</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/user/signup}">会員登録</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"
                            th:text="${#authentication.name} + ' さん'">User</a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/mypage}">マイページ</a></li>
                            <li><a class="dropdown-item" th:href="@{/wishlist/list}">お気に入り</a></li>
                            <li><a class="dropdown-item" th:href="@{/planner/list}">マイプラン</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" th:href="@{/user/logout}">ログアウト</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <script>
        (function () {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.jroute-header .nav-link');

            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (!href) return;

                if (href === '/') {
                    if (currentPath === '/') link.classList.add('active');
                } else if (currentPath.startsWith(href) || (href === '/place/list' && currentPath.startsWith('/place'))) {
                    link.classList.add('active');
                }
            });
        })();
    </script>
</div>

</html>
