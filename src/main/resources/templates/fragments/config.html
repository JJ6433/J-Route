<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="configFragment">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>J-Route - AIが考える失敗しない日本旅行</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="/css/jroute.css" rel="stylesheet">
    <style>
      /* ログイン後CSS適用基本スタイル（外部CSSロード失敗時備え） */
      body { font-family: "Noto Sans JP", sans-serif; color: #333; background: #fff; }
      .jroute-header .navbar-brand { font-weight: 700; color: #333 !important; }
      .jroute-header .navbar-brand i { color: #e74c3c; }
      .jroute-btn-login, .jroute-btn-primary, .jroute-btn-search { background: #e74c3c !important; color: #fff !important; border: none; border-radius: 8px; }
      .jroute-hero { background: linear-gradient(rgba(0,0,0,.4), rgba(0,0,0,.4)), url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=1600&amp;q=80') center/cover no-repeat; color: #fff; padding: 80px 0 100px; border-radius: 8px; }
      .jroute-hero .text-accent { color: #e74c3c; background: rgba(255,255,255,.9); padding: 2px 8px; border-radius: 4px; }
      .jroute-section-title { font-size: 1.5rem; font-weight: 700; color: #333; margin-bottom: 1rem; }
      .jroute-card { background: #fff; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
      .jroute-search-bar { background: #f8f9fa; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; }
      .jroute-footer { background: #2c3e50 !important; color: rgba(255,255,255,.9); padding: 1.5rem 0; margin-top: auto; }
      .jroute-footer a { color: rgba(255,255,255,.85); text-decoration: none; }
      .btn-outline-view { border: 1px solid #333; color: #333; border-radius: 8px; padding: 8px 16px; text-decoration: none; display: inline-block; }
    </style>
</th:block>
