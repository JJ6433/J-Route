<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="footerFragment">
    <footer class="jroute-footer">
        <div class="container">
            <div class="row">
                <!-- Brand Info -->
                <div class="col-lg-4 mb-5 mb-lg-0">
                    <a th:href="@{/}" class="footer-logo">
                        <i class="bi bi-geo-alt-fill"></i>J-Route
                    </a>
                    <p class="mb-4">AIベースのスマートな日本旅行プランナー。<br>あなたの旅をより特別なものにします。</p>
                </div>

                <!-- Quick Navigation -->
                <div class="col-lg-4 mb-5 mb-lg-0 text-lg-center">
                    <h5 class="footer-title">クイックメニュー</h5>
                    <ul class="list-unstyled mb-0">
                        <li class="mb-2"><a th:href="@{/}">ホーム</a></li>
                        <li class="mb-2"><a th:href="@{/place/list}">旅行地検索</a></li>
                        <li class="mb-2"><a th:href="@{/planner/form}">AIプランナー</a></li>
                        <li class="mb-2 text-danger"><a th:href="@{/info/team}">チーム紹介</a></li>
                    </ul>
                </div>

                <!-- Support & Social -->
                <div class="col-lg-4 text-lg-end">
                    <h5 class="footer-title">カスタマーサポート</h5>
                    <ul class="list-unstyled mb-4">
                        <li class="mb-2"><a th:href="@{/info/terms}">利用規約</a></li>
                        <li class="mb-2"><a th:href="@{/info/privacy}">プライバシーポリシー</a></li>
                        <li class="mb-2"><a th:href="@{/info/contact}">お問い合わせ</a></li>
                    </ul>
                    <div class="social-icons">
                        <a href="#"><i class="bi bi-instagram"></i></a>
                        <a href="#"><i class="bi bi-twitter-x"></i></a>
                    </div>
                </div>
            </div>
            <hr class="mt-4 mb-3" style="border-color: rgba(255,255,255,0.1);">
            <div class="text-center small">
                <span>J-Route 旅行サービス © 2026. All rights reserved.</span>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>

</html>
