# サーバーポート
server.port=30000

# DB設定
# ë¡ì»¬ MySQLì´ ì¤í ì¤ì´ì´ì¼ íë©°, jroute DB ìì± í schema.sql ì¤í íì
# ë¹ë°ë²í¸ê° ë¤ë¥´ë©´ ìë ê°ì ìì íê±°ë, ë¡ì»¬ìì application-local.properties ë¡ ì¤ë²ë¼ì´ë
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/jroute?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# MyBatis 設定
mybatis.type-aliases-package=com.blog.dto
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Thymeleaf 設定
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File upload 設定 
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ログ設定
logging.level.root=INFO
logging.level.com.blog.mapper=DEBUG

# 秘密設定ファイルの読み込み
spring.profiles.include=secret

# Google Gemini API Configuration (key는 application-secret.properties에 저장)
google.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent

# RapidAPI 設定 
rapidapi.host=booking-com15.p.rapidapi.com