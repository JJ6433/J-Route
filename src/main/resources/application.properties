# サーバーポート
server.port=30000

# DB設定
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/jroute?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# MyBatis設定
mybatis.type-aliases-package=com.blog.dto
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Thymeleaf設定
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ファイルアップロード設定
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ログ設定
logging.level.root=INFO
logging.level.com.blog.mapper=DEBUG

# 秘密設定ファイルの読み込み
spring.config.import=optional:classpath:application-secret.properties

# API設定 (URLとHost)
google.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
rapidapi.host=booking-com15.p.rapidapi.com
