# Server Port: 固定ポートで起動
server.port=30000

# Database Configuration (MySQL)
# 로컬 MySQL이 실행 중이어야 하며, jroute DB 생성 후 schema.sql 실행 필요
# 비밀번호가 다르면 아래 값을 수정하거나, 로컬에서 application-local.properties 로 오버라이드
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/jroute?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# MyBatis Configuration
mybatis.type-aliases-package=com.blog.dto
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File upload (여행지 대표 이미지)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.root=INFO
logging.level.com.blog.mapper=DEBUG

